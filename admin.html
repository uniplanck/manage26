<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro管理画面 | 経営OS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- ドラッグ&ドロップ用ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
  body { font-family: 'Noto Sans JP', sans-serif; padding: 15px; background: #f1f5f9; color: #334155; margin: 0; }
  .container { max-width: 900px; margin: 0 auto; padding-bottom: 80px; }
  .card { background: #fff; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
  
  h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; color: #0f172a; display: flex; align-items: center; gap: 10px; }
  h3 { font-size: 1rem; margin-bottom: 15px; color: #64748b; }
  
  #login-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
  .login-card { width: 100%; max-width: 400px; text-align: center; }
  
  .input-group { margin-bottom: 15px; text-align: left; }
  .input-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #64748b; }
  .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
  
  .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; color: #fff; margin-bottom: 10px; }
  .btn-primary { background: #2563eb; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-google { background: #fff; color: #333; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; gap: 10px; }
  
  .btn-remove { background: #ef4444; padding: 6px 12px; font-size: 0.8rem; width: auto; color: #fff; border-radius: 4px; }
  .btn-edit { background: #0f172a; padding: 6px 12px; font-size: 0.8rem; width: auto; color: #fff; border-radius: 4px; }
  .btn-cancel { background: #64748b; padding: 6px 12px; font-size: 0.8rem; width: auto; color: #fff; border-radius: 4px; }

  #admin-panel { display: none; }
  .form-grid { display: grid; gap: 15px; grid-template-columns: 1fr; }
  @media (min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }
  
  .history-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

  .review-list { list-style: none; padding: 0; margin-top: 20px; }
  .review-item { 
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; 
    display: flex; gap: 15px; align-items: center; cursor: grab; transition: transform 0.2s, box-shadow 0.2s;
  }
  .review-item:active { cursor: grabbing; }
  .review-item.sortable-ghost { opacity: 0.4; background: #e0f2fe; }
  .review-item:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

  .review-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #cbd5e1; flex-shrink: 0; border: 2px solid #f1f5f9; }
  .review-content { flex: 1; min-width: 0; }
  .review-name { font-weight: bold; font-size: 0.9rem; color: #0f172a; display: block; }
  .review-text { font-size: 0.85rem; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 4px; }
  
  .review-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .handle { color: #cbd5e1; cursor: grab; padding: 10px 5px; }

  /* Loading Overlay */
  #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
  .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p id="loader-text" style="margin-top:15px; font-weight:bold; color:#2563eb;">処理中...</p>
  </div>

  <div id="login-panel" class="container">
    <div class="card login-card">
      <h2 style="justify-content:center; border:none;">🔒 管理者ログイン</h2>
      <div class="input-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="admin@example.com">
      </div>
      <div class="input-group">
        <label>パスワード</label>
        <input type="password" id="login-pass" placeholder="Password">
      </div>
      <button class="btn btn-primary" onclick="loginEmail()">ログイン</button>
      <div style="margin: 20px 0; font-size: 0.8rem; color: #94a3b8;">または</div>
      <button class="btn btn-google" onclick="loginGoogle()">
        <i class="fab fa-google"></i> Googleでログイン
      </button>
    </div>
  </div>

  <div id="admin-panel" class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1 style="margin:0; font-size:1.5rem;">Pro管理 OS</h1>
        <button onclick="logout()" class="btn btn-remove" style="width:auto; margin:0; background:#94a3b8;">ログアウト</button>
    </div>
    
    <div class="card">
      <h2>📊 販売ステータス</h2>
      <div class="form-grid">
        <div class="input-group">
          <label>現在の価格</label>
          <input type="number" id="current-price">
        </div>
        <div class="input-group">
          <label>次の価格</label>
          <input type="number" id="next-price">
        </div>
        <div class="input-group">
          <label>残り人数</label>
          <input type="number" id="remaining">
        </div>
      </div>
      <div class="input-group" style="margin-top: 20px; border-top: 1px dashed #e2e8f0; padding-top: 20px;">
        <label>🏁 完売履歴</label>
        <div class="history-inputs">
            <input type="text" id="hist-title" placeholder="タイトル">
            <input type="text" id="hist-count" placeholder="部数">
            <input type="number" id="hist-price" placeholder="価格">
            <input type="text" id="hist-date" placeholder="完売日">
        </div>
        <button class="btn" style="background:#0f172a;" onclick="addHistory()">履歴リストに追加</button>
        <ul id="history-list" style="margin-top: 15px;"></ul>
      </div>
      <button class="btn btn-primary" onclick="saveStatus()" style="margin-top: 20px;">設定を保存する</button>
    </div>

    <div class="card">
      <h2>💬 口コミ・実績管理</h2>
      
      <div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:25px;">
          <h3 style="margin-top:0; color:#0f172a;" id="review-form-title">新規追加</h3>

          <div class="form-grid">
            <div class="input-group">
              <label>表示名 / 肩書き</label>
              <input type="text" id="r-name" placeholder="名前 @フォロワー数">
            </div>
            <div class="input-group">
              <label>画像 (URLまたはファイル)</label>
              <input type="text" id="r-img" placeholder="https://..." style="margin-bottom:5px;">
              <input type="file" id="r-file" accept="image/*">
            </div>
          </div>

          <div class="input-group">
            <label>口コミ内容</label>
            <textarea id="r-content" rows="4" placeholder="実績や感謝の声を記入..."></textarea>
          </div>

          <div class="input-group">
            <label>SNSリンク</label>
            <div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
              <input type="text" id="r-x" placeholder="X (Twitter) URL">
              <input type="text" id="r-ig" placeholder="Instagram URL">
            </div>
          </div>
          
          <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" id="btn-save-review" onclick="saveReview()">保存する</button>
            <button class="btn btn-cancel" id="btn-cancel-review" onclick="resetReviewForm()" style="display:none;">キャンセル</button>
          </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="margin:0;">ドラッグして並べ替え</h3>
          <button class="btn" onclick="saveOrder()" style="width:auto; padding:8px 16px; font-size:0.85rem; background:#059669; margin:0;">
            <i class="fas fa-save"></i> 並び順を確定
          </button>
      </div>

      <ul id="review-list" class="review-list">
          <li style="text-align:center; color:#94a3b8; padding:20px;">読み込み中...</li>
      </ul>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc, deleteDoc, writeBatch, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = JSON.parse('{"apiKey":"","authDomain":"manage26-price.firebaseapp.com","projectId":"manage26-price","storageBucket":"manage26-price.firebasestorage.app","messagingSenderId":"405218108343","appId":"1:405218108343:web:3c91b61adac9e9e07ffe32","measurementId":"G-CDWBHCM00C"}');

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    let historyData = [];
    let allReviews = [];
    let editingReviewId = null;
    let sortable = null;

    onAuthStateChanged(auth, (user) => {
        const loginPanel = document.getElementById('login-panel');
        const adminPanel = document.getElementById('admin-panel');
        if (user) {
            loginPanel.style.display = 'none';
            adminPanel.style.display = 'block';
            loadData();
            initReviewSync();
        } else {
            loginPanel.style.display = 'flex';
            adminPanel.style.display = 'none';
        }
    });

    window.loginEmail = async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("失敗: " + e.message); }
    };
    window.loginGoogle = async () => {
        try { await signInWithPopup(auth, googleProvider); } catch (e) { alert("失敗: " + e.message); }
    };
    window.logout = () => signOut(auth);

    async function loadData() {
        const snap = await getDoc(doc(db, "site_config", "status"));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('current-price').value = d.current_price || "";
            document.getElementById('next-price').value = d.next_price || "";
            document.getElementById('remaining').value = d.remaining || "";
            historyData = d.sold_out_history || [];
            renderHistory();
        }
    }

    function initReviewSync() {
        onSnapshot(collection(db, "testimonials"), (snapshot) => {
            allReviews = [];
            snapshot.forEach(doc => allReviews.push({ id: doc.id, ...doc.data() }));
            
            allReviews.sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
            renderReviewList();
        });
    }

    function renderReviewList() {
        const list = document.getElementById('review-list');
        list.innerHTML = "";
        
        allReviews.forEach((data, index) => {
            const item = document.createElement('li');
            item.className = 'review-item';
            item.dataset.id = data.id;
            item.innerHTML = `
                <div class="handle"><i class="fas fa-grip-vertical"></i></div>
                <img src="${data.image_url}" class="review-img" onerror="this.src='https://via.placeholder.com/50'">
                <div class="review-content">
                    <span class="review-name">${data.name}</span>
                    <div class="review-text">${data.content}</div>
                </div>
                <div class="review-actions">
                    <button class="btn-edit" onclick='triggerEdit("${data.id}")'>編集</button>
                    <button class="btn-remove" onclick='deleteReview("${data.id}")'>削除</button>
                </div>
            `;
            list.appendChild(item);
        });

        if (sortable) sortable.destroy();
        sortable = new Sortable(list, {
            animation: 150,
            handle: '.handle',
            ghostClass: 'sortable-ghost',
            onEnd: () => {
                const newOrder = Array.from(list.children).map(li => li.dataset.id);
                allReviews.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
            }
        });
    }

    window.saveOrder = async () => {
        const batch = writeBatch(db);
        allReviews.forEach((rev, idx) => {
            batch.update(doc(db, "testimonials", rev.id), { order: idx });
        });
        await batch.commit();
        alert("並び順を保存しました");
    };

    async function uploadFromUrl(imageUrl) {
        if (!imageUrl || imageUrl.includes('firebasestorage')) return imageUrl;
        try {
            const response = await fetch(imageUrl);
            const blob = await response.blob();
            const fileName = `reviews/auto_${Date.now()}.png`;
            const storageRef = ref(storage, fileName);
            await uploadBytes(storageRef, blob);
            return await getDownloadURL(storageRef);
        } catch (e) {
            console.warn("画像転送失敗:", e);
            return imageUrl;
        }
    }

    window.saveReview = async () => {
        if (!auth.currentUser) return;
        const btn = document.getElementById('btn-save-review');
        btn.disabled = true;
        btn.innerText = "処理中..."; // ボタンテキスト変更
        
        const loader = document.getElementById('loader');
        document.getElementById('loader-text').innerText = "データを保存中...";
        loader.style.display = 'flex';

        try {
            let imgUrl = document.getElementById('r-img').value;
            const file = document.getElementById('r-file').files[0];
            
            if (file) {
                const storageRef = ref(storage, `reviews/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                imgUrl = await getDownloadURL(storageRef);
            } else if (imgUrl) {
                imgUrl = await uploadFromUrl(imgUrl);
            }

            const payload = {
                name: document.getElementById('r-name').value,
                image_url: imgUrl,
                content: document.getElementById('r-content').value,
                link_x: document.getElementById('r-x').value,
                link_ig: document.getElementById('r-ig').value,
                updatedAt: serverTimestamp()
            };

            if (editingReviewId) {
                await updateDoc(doc(db, "testimonials", editingReviewId), payload);
                alert("口コミを更新しました");
            } else {
                payload.order = allReviews.length;
                payload.createdAt = serverTimestamp();
                await addDoc(collection(db, "testimonials"), payload);
                alert("口コミを追加しました");
            }
            
            resetReviewForm();
        } catch (e) {
            alert("エラー: " + e.message);
        } finally {
            btn.disabled = false;
            if(editingReviewId) {
                btn.innerText = "更新する";
            } else {
                btn.innerText = "保存する";
            }
            loader.style.display = 'none';
        }
    };

    window.triggerEdit = (id) => {
        const data = allReviews.find(r => r.id === id);
        editingReviewId = id;
        document.getElementById('review-form-title').innerText = "編集モード";
        document.getElementById('btn-save-review').innerText = "更新する";
        document.getElementById('btn-cancel-review').style.display = "inline-block";
        document.getElementById('r-name').value = data.name;
        document.getElementById('r-img').value = data.image_url;
        document.getElementById('r-content').value = data.content;
        document.getElementById('r-x').value = data.link_x || "";
        document.getElementById('r-ig').value = data.link_ig || "";
        window.scrollTo({ top: 400, behavior: 'smooth' });
    };

    window.resetReviewForm = () => {
        editingReviewId = null;
        document.getElementById('review-form-title').innerText = "新規追加";
        document.getElementById('btn-save-review').innerText = "保存する";
        document.getElementById('btn-cancel-review').style.display = "none";
        document.getElementById('r-name').value = "";
        document.getElementById('r-img').value = "";
        document.getElementById('r-file').value = "";
        document.getElementById('r-content').value = "";
        document.getElementById('r-x').value = "";
        document.getElementById('r-ig').value = "";
    };

    window.deleteReview = async (id) => {
        if (confirm("削除しますか？")) await deleteDoc(doc(db, "testimonials", id));
    };

    window.addHistory = () => {
        historyData.push({
            title: document.getElementById('hist-title').value,
            count: document.getElementById('hist-count').value,
            price: Number(document.getElementById('hist-price').value),
            date: document.getElementById('hist-date').value
        });
        renderHistory();
    };

    window.removeHistory = (idx) => { historyData.splice(idx, 1); renderHistory(); };

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = historyData.map((h, i) => `
            <li class="history-item">
                <div><strong>${h.title}</strong> (${h.count}) - ¥${h.price.toLocaleString()} [${h.date}]</div>
                <button class="btn-remove" onclick="removeHistory(${i})">削除</button>
            </li>
        `).join('');
    }

    window.saveStatus = async () => {
        await setDoc(doc(db, "site_config", "status"), {
            current_price: Number(document.getElementById('current-price').value),
            next_price: Number(document.getElementById('next-price').value),
            remaining: Number(document.getElementById('remaining').value),
            sold_out_history: historyData
        });
        alert("保存しました");
    };
  </script>
</body>
</html>
